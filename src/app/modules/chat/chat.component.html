<div class="h-screen bg-base-200 flex">
  <aside class="w-64 bg-base-100 border-r border-base-300 hidden md:flex flex-col">
    <div class="p-4 font-bold text-lg border-b border-base-300">
      💬 Salas
    </div>

    <ul class="menu p-2 flex-1 overflow-y-auto">
      <li><a class="active"># geral</a></li>
    </ul>

    <div class="p-3 border-t border-base-300 text-sm opacity-70">
      Online: 12
    </div>
  </aside>

  <main class="flex-1 flex flex-col">

    <header class="h-14 bg-base-100 border-b border-base-300 flex items-center px-4">
      <h2 class="font-semibold text-lg"># geral</h2>
    </header>

    <section class="flex-1 overflow-y-auto p-4 space-y-3" #list>
      <ng-container *ngFor="let m of messages">
        <div class="flex gap-3" [class.justify-end]="m.userName === userName">
          
          <div class="avatar placeholder" *ngIf="m.userName !== userName">
            <div class="bg-neutral text-neutral-content rounded-full w-8">
              <span>{{ (m.userName || '?')[0] }}</span>
            </div>
          </div>

          <div [class.text-right]="m.userName === userName">
            <div class="text-sm font-semibold">
              {{ m.userName }}
              <span class="text-xs opacity-60 ml-1">
                {{ m.ts ? (m.ts | date:'HH:mm') : '' }}
              </span>
            </div>

            <div
              class="text-sm opacity-90"
              [class.bg-base-300]="m.userName === userName"
              [class.rounded-lg]="m.userName === userName"
              [class.px-3]="m.userName === userName"
              [class.py-1]="m.userName === userName"
              [class.inline-block]="m.userName === userName"
            >
              {{ m.text }}
            </div>
          </div>
        </div>
      </ng-container>
    </section>

    <footer class="p-3 bg-base-100 border-t border-base-300">
      <div class="flex gap-2">
        <input
          type="text"
          class="input input-bordered w-full bg-base-200"
          [(ngModel)]="text"
          (keydown.enter)="send()"
          placeholder="Digite uma mensagem..."
        />
        <button class="btn btn-neutral" (click)="send()">
          Enviar
        </button>
      </div>
    </footer>
  </main>
</div>
