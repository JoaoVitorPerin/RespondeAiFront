<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="card bg-base-100 shadow-xl border border-base-300">
      <div class="card-body gap-5">

        <div>
          <h1 class="text-2xl font-bold">Crie sua conta</h1>
          <p class="text-sm opacity-70 mt-1">
            É rápido e gratuito. Entre para o chat agora mesmo!
          </p>
        </div>

        <div class="space-y-4">
          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Username</span>
            </div>
            <input
              type="text"
              class="input input-bordered w-full"
              placeholder="Como podemos te chamar?"
            />
          </label>

          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Email</span>
            </div>
            <input
              type="email"
              class="input input-bordered w-full"
              placeholder="Digite seu email"
              autocomplete="email"
            />
          </label>

          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Senha</span>
            </div>
            <input
              type="password"
              class="input input-bordered w-full"
              placeholder="Crie uma senha segura"
              autocomplete="new-password"
            />
          </label>

          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Confirmar senha</span>
            </div>
            <input
              type="password"
              class="input input-bordered w-full"
              placeholder="Digite a senha novamente"
              autocomplete="new-password"
            />
          </label>
        </div>

        <button class="btn btn-neutral w-full mt-2">
          Criar conta
        </button>

        <p class="text-xs opacity-60 text-center mt-1">
          Ao criar uma conta, você concorda com nossos
          <a class="link link-hover">Termos</a> e
          <a class="link link-hover">Política de Privacidade</a>.
        </p>

        <div class="divider my-1"></div>

        <p class="text-sm text-center opacity-70">
          Já tem uma conta?
          <a class="link link-hover font-medium" (click)="navigateToLogin()">
            Entrar
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
