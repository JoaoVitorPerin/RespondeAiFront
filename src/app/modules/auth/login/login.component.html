<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="card bg-base-100 shadow-xl border border-base-300">
      <div class="card-body gap-5">
        
        <div>
          <h1 class="text-2xl font-bold">Bem-vindo novamente!</h1>
          <p class="text-sm opacity-70 mt-1">
            Entre agora no chat e comece novas amizades!
          </p>
        </div>

        <form class="space-y-4" [formGroup]="formLogin">
          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Email</span>
            </div>
            <input
              type="email"
              class="input input-bordered w-full"
              placeholder="Digite seu email"
              autocomplete="email"
              formControlName="email"
              ngDefaultControl
            />
          </label>

          <label class="form-control w-full">
            <div class="label">
              <span class="label-text">Senha</span>
              <a class="label-text-alt link link-hover opacity-80" href="#">
                Esqueci minha senha
              </a>
            </div>
            <input
              type="password"
              class="input input-bordered w-full"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              formControlName="password"
              ngDefaultControl
            />
          </label>

          <button class="btn btn-neutral w-full mt-2" (click)="login()" [disabled]="formLogin.invalid">
            Login
          </button>
        </form>

        

        <div class="divider my-1">ou</div>

        <button class="btn btn-outline w-full" (click)="navigateToCadastro()">
          Criar conta
        </button>

        <p class="text-xs opacity-60 text-center mt-1">
          Ao continuar, você concorda com nossos termos e política de privacidade.
        </p>
      </div>
    </div>
  </div>
</div>
