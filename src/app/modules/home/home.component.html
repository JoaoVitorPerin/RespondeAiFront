<div class="flex h-screen w-full">
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 flex items-center px-6 shadow-sm" style="border-bottom: 2px solid #0d1014;">
      <h1 class="text-2xl font-semibold">Home</h1>
    </header>

    <div class="flex-1 overflow-auto p-6">
      <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-lg shadow p-6">
          <h2 class="text-xl font-semibold text-gray-900 mb-4">Bem-vindo! 👋</h2>
          <p class="text-gray-600 mb-6">Gerencie seus chats e usuários através do menu lateral.</p>

          <button class="btn btn-neutral w-full mt-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg px-4 py-2 font-medium transition-colors" (click)="gerarLink()">
            Gerar Link do Chat
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
